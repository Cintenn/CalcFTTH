version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ftth-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ftth}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ftth-network

  # API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ftth-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/ftth}
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-maul}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    networks:
      - ftth-network
    restart: unless-stopped

  # Nginx Reverse Proxy (optional, for production testing)
  nginx:
    image: nginx:alpine
    container_name: ftth-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ftth-calculator/dist/public:/usr/share/nginx/html:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - api
    networks:
      - ftth-network
    restart: unless-stopped
    profiles:
      - nginx

volumes:
  postgres_data:
    driver: local

networks:
  ftth-network:
    driver: bridge

# Usage:
#
# Development (PostgreSQL + API only):
#   docker-compose up -d
#
# Production-like (PostgreSQL + API + Nginx):
#   docker-compose --profile nginx up -d
#
# View logs:
#   docker-compose logs -f api
#   docker-compose logs -f postgres
#
# Stop all:
#   docker-compose down
#
# Destroy everything (including data):
#   docker-compose down -v
